<svg xmlns="http://www.w3.org/2000/svg" width="959" height="630" viewBox="0 0 959 630" role="img" aria-label="Threshold-Based vs SLO-Based Alerting">
<defs>
<filter id="panelShadow" x="-10%" y="-10%" width="120%" height="140%">
<feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(0,0,0,0.05)"/>
</filter>
<marker id="arrow" viewBox="0 0 11 12" markerWidth="11" markerHeight="12" refX="9.5" refY="6" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
<path d="M 1.5 1.0 L 9.5 6 L 1.5 11.0" fill="none" stroke="#8E877C" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect width="959" height="630" fill="#F7F4EE"/>
<text x="479.5" y="56" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="32" font-weight="700" fill="#1F1F1C">Threshold-Based vs SLO-Based Alerting</text>
<text x="479.5" y="80" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="500" fill="#6D685F">Fixed metric thresholds react to signal spikes, while SLO alerting reacts to user-impacting error-budget burn</text>
<rect x="98.0" y="126.0" width="368.0" height="392.0" rx="18" fill="#FCFBF8" stroke="#E6E0D5" filter="url(#panelShadow)"/>
<text x="282.0" y="160.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" letter-spacing="0.06em" fill="#1F1F1C">Threshold-Based Alerting</text>
<text x="282.0" y="180.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">Alert when a raw metric crosses a static</text>
<text x="282.0" y="194.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">limit</text>
<text x="282.0" y="478.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">Thresholds are simple to set up, but they</text>
<text x="282.0" y="492.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">treat every threshold crossing as equally</text>
<text x="282.0" y="506.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">important regardless of customer impact.</text>
<rect x="486.0" y="126.0" width="375.0" height="470.0" rx="18" fill="#FCFBF8" stroke="#E6E0D5" filter="url(#panelShadow)"/>
<text x="673.5" y="160.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" letter-spacing="0.06em" fill="#1F1F1C">SLO-Based Alerting</text>
<text x="673.5" y="180.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">Alert when reliability objectives are burning</text>
<text x="673.5" y="194.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">too fast</text>
<text x="673.5" y="556.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">SLO alerts are tied to the allowed</text>
<text x="673.5" y="570.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">reliability target, so they focus attention</text>
<text x="673.5" y="584.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">on issues that threaten the user experience</text>
<rect x="122.0" y="212.0" width="149.0" height="46.0" rx="8" fill="#FFFFFF" stroke="#DAD4CA" stroke-width="1.2"/>
<text x="196.5" y="231.5" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">CPU, latency, or</text>
<text x="196.5" y="246.5" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">error-rate metric</text>
<rect x="510.0" y="226.0" width="142.0" height="46.0" rx="8" fill="#FFFFFF" stroke="#DAD4CA" stroke-width="1.2"/>
<text x="581.0" y="245.5" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">Good vs bad user</text>
<text x="581.0" y="260.5" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">requests</text>
<rect x="125.5" y="276.0" width="142.0" height="46.0" rx="8" fill="#FFFFFF" stroke="#DAD4CA" stroke-width="1.2"/>
<text x="196.5" y="303.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">Static threshold</text>
<rect x="307.0" y="284.0" width="135.0" height="46.0" rx="8" fill="#FFFFFF" stroke="#DAD4CA" stroke-width="1.2"/>
<text x="374.5" y="296.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">Can be noisy or</text>
<text x="374.5" y="311.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">miss real user</text>
<text x="374.5" y="326.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">pain</text>
<rect x="520.5" y="290.0" width="121.0" height="46.0" rx="8" fill="#FFFFFF" stroke="#DAD4CA" stroke-width="1.2"/>
<text x="581.0" y="309.5" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">Service level</text>
<text x="581.0" y="324.5" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">indicator</text>
<rect x="688.0" y="334.0" width="149.0" height="46.0" rx="8" fill="#FFFFFF" stroke="#DAD4CA" stroke-width="1.2"/>
<text x="762.5" y="346.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">Pages when</text>
<text x="762.5" y="361.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">reliability is</text>
<text x="762.5" y="376.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">genuinely at risk</text>
<rect x="137.5" y="340.0" width="118.0" height="46.0" rx="8" fill="#EAF4FF" stroke="#58A6F4" stroke-width="2"/>
<text x="196.5" y="359.5" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">Metric &gt;</text>
<text x="196.5" y="374.5" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">threshold?</text>
<rect x="513.5" y="354.0" width="135.0" height="46.0" rx="8" fill="#FFFFFF" stroke="#DAD4CA" stroke-width="1.2"/>
<text x="581.0" y="373.5" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">Remaining error</text>
<text x="581.0" y="388.5" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">budget</text>
<rect x="140.5" y="404.0" width="112.0" height="42.0" rx="8" fill="#FDE3E1" stroke="#F06A63" stroke-width="1.6"/>
<text x="196.5" y="429.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#C94F48">Page on-call</text>
<rect x="522.0" y="418.0" width="118.0" height="46.0" rx="8" fill="#EAF4FF" stroke="#58A6F4" stroke-width="2"/>
<text x="581.0" y="437.5" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">Burn-rate</text>
<text x="581.0" y="452.5" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">evaluation</text>
<rect x="525.0" y="482.0" width="112.0" height="42.0" rx="8" fill="#FDE3E1" stroke="#F06A63" stroke-width="1.6"/>
<text x="581.0" y="507.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#C94F48">Page on-call</text>
<path d="M 196.5 258.0 L 196.5 275.0" fill="none" stroke="#8E877C" stroke-width="1.7" marker-end="url(#arrow)"/>
<path d="M 196.5 322.0 L 196.5 339.0" fill="none" stroke="#8E877C" stroke-width="1.7" marker-end="url(#arrow)"/>
<path d="M 196.5 386.0 L 196.5 403.0" fill="none" stroke="#8E877C" stroke-width="1.7" marker-end="url(#arrow)"/>
<path d="M 255.5 363.0 L 273.5 363.0 Q 283.5 363.0 283.5 353.0 L 283.5 317.0 Q 283.5 307.0 293.5 307.0 L 306.0 307.0" fill="none" stroke="#8E877C" stroke-width="1.7" marker-end="url(#arrow)"/>
<path d="M 581.0 272.0 L 581.0 289.0" fill="none" stroke="#8E877C" stroke-width="1.7" marker-end="url(#arrow)"/>
<path d="M 581.0 336.0 L 581.0 353.0" fill="none" stroke="#8E877C" stroke-width="1.7" marker-end="url(#arrow)"/>
