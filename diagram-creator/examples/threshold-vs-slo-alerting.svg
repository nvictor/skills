<path d="M 640.0 441.0 L 659.5 441.0 Q 669.5 441.0 669.5 431.0 L 669.5 365.8 Q 669.5 357.0 678.2 357.0 L 687.0 357.0" fill="none" stroke="#8E877C" stroke-width="1.7" marker-end="url(#arrow)"/>
</svg>