<svg xmlns="http://www.w3.org/2000/svg" width="744" height="520" viewBox="0 0 744 520" role="img" aria-label="Threshold vs Multi-Window SLO Alerting">
<defs>
<filter id="panelShadow" x="-10%" y="-10%" width="120%" height="140%">
<feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(0,0,0,0.05)"/>
</filter>
<marker id="arrow" viewBox="0 0 11 12" markerWidth="11" markerHeight="12" refX="9.5" refY="6" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
<path d="M 1.5 1.0 L 9.5 6 L 1.5 11.0" fill="none" stroke="#8E877C" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect width="744" height="520" fill="#F7F4EE"/>
<text x="372.0" y="56" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="32" font-weight="700" fill="#1F1F1C">Threshold vs Multi-Window SLO Alerting</text>
<text x="372.0" y="80" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="500" fill="#6D685F">Compact chart nodes show noisy threshold crossings versus sustained long-window burn</text>
<rect x="42.0" y="126.0" width="320.0" height="360.0" rx="18" fill="#FCFBF8" stroke="#E6E0D5" filter="url(#panelShadow)"/>
<text x="202.0" y="160.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" letter-spacing="0.06em" fill="#1F1F1C">Threshold-Based Alerting</text>
<text x="202.0" y="180.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">A single metric crosses the alert</text>
<text x="202.0" y="194.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">threshold repeatedly</text>
<text x="202.0" y="446.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">The metric bounces above and below</text>
<text x="202.0" y="460.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">the threshold several times even</text>
<text x="202.0" y="474.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">though the issue is not sustained.</text>
<rect x="382.0" y="126.0" width="320.0" height="360.0" rx="18" fill="#FCFBF8" stroke="#E6E0D5" filter="url(#panelShadow)"/>
<text x="542.0" y="160.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" letter-spacing="0.06em" fill="#1F1F1C">Multi-Window SLO Alerting</text>
<text x="542.0" y="180.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">A short window oscillates, but the</text>
<text x="542.0" y="194.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">long window stays elevated long</text>
<text x="542.0" y="208.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">enough to matter</text>
<text x="542.0" y="446.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">Short windows show volatility, but</text>
<text x="542.0" y="460.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">the long window captures sustained</text>
<text x="542.0" y="474.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">error-budget burn before paging.</text>
<rect x="85.0" y="226.0" width="244.0" height="188.0" rx="12" fill="#FFF9F3" stroke="#F27A2B" stroke-width="1.8"/>
<text x="207.0" y="250.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#1F1F1C">Metric vs threshold</text>
<line x1="99.0" y1="265.0" x2="109.0" y2="265.0" stroke="#F27A2B" stroke-width="2.2" stroke-linecap="round"/>
<text x="113.0" y="268.0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">Metric</text>
<line x1="166.6" y1="265.0" x2="176.6" y2="265.0" stroke="#6D685F" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="5 4"/>
<text x="180.6" y="268.0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">Threshold</text>
<rect x="99.0" y="287.0" width="216.0" height="83.0" rx="8" fill="#FBFAF7" stroke="#DAD4CA" stroke-width="1"/>
<line x1="99.0" y1="370.0" x2="315.0" y2="370.0" stroke="#DAD4CA" stroke-width="1"/>
<path d="M 99.0 321.9 L 123.0 321.9 L 147.0 321.9 L 171.0 321.9 L 195.0 321.9 L 219.0 321.9 L 243.0 321.9 L 267.0 321.9 L 291.0 321.9 L 315.0 321.9" fill="none" stroke="#6D685F" stroke-width="1.6" stroke-dasharray="5 4"/>
<path d="M 99.0 364.3 L 123.0 306.0 L 147.0 351.0 L 171.0 296.7 L 195.0 343.1 L 219.0 292.7 L 243.0 347.1 L 267.0 300.7 L 291.0 353.7 L 315.0 324.5" fill="none" stroke="#F27A2B" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
<text x="207.0" y="386.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">Repeated spikes cause churn</text>
<text x="207.0" y="398.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">and paging friction.</text>
<rect x="425.0" y="226.0" width="244.0" height="188.0" rx="12" fill="#FFF9F3" stroke="#F27A2B" stroke-width="1.8"/>
<text x="547.0" y="250.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#1F1F1C">Short and long windows</text>
<line x1="439.0" y1="265.0" x2="449.0" y2="265.0" stroke="#58A6F4" stroke-width="2.2" stroke-linecap="round"/>
<text x="453.0" y="268.0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">Short window</text>
<line x1="540.2" y1="265.0" x2="550.2" y2="265.0" stroke="#F27A2B" stroke-width="2.2" stroke-linecap="round"/>
<text x="554.2" y="268.0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">Long window</text>
<line x1="439.0" y1="279.0" x2="449.0" y2="279.0" stroke="#6D685F" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="5 4"/>
<text x="453.0" y="282.0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">SLO trigger</text>
<rect x="439.0" y="301.0" width="216.0" height="58.0" rx="8" fill="#FBFAF7" stroke="#DAD4CA" stroke-width="1"/>
<line x1="439.0" y1="359.0" x2="655.0" y2="359.0" stroke="#DAD4CA" stroke-width="1"/>
<path d="M 439.0 319.8 L 463.0 319.8 L 487.0 319.8 L 511.0 319.8 L 535.0 319.8 L 559.0 319.8 L 583.0 319.8 L 607.0 319.8 L 631.0 319.8 L 655.0 319.8" fill="none" stroke="#6D685F" stroke-width="1.6" stroke-dasharray="5 4"/>
<path d="M 439.0 348.8 L 463.0 330.0 L 487.0 341.7 L 511.0 315.2 L 535.0 335.5 L 559.0 305.0 L 583.0 325.3 L 607.0 312.8 L 631.0 332.3 L 655.0 345.6" fill="none" stroke="#58A6F4" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M 439.0 355.0 L 463.0 351.9 L 487.0 347.2 L 511.0 336.2 L 535.0 323.0 L 559.0 311.2 L 583.0 308.9 L 607.0 313.6 L 631.0 328.4 L 655.0 348.0" fill="none" stroke="#F27A2B" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
<text x="547.0" y="375.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">The long window stays high</text>
<text x="547.0" y="387.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">enough to justify</text>
<text x="547.0" y="399.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">intervention.</text>
</svg>