<svg xmlns="http://www.w3.org/2000/svg" width="744" height="520" viewBox="0 0 744 520" role="img" aria-label="Threshold vs Multi-Window SLO Alerting">
<defs>
<filter id="panelShadow" x="-10%" y="-10%" width="120%" height="140%">
<feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(0,0,0,0.05)"/>
</filter>
<marker id="arrow" viewBox="0 0 11 12" markerWidth="11" markerHeight="12" refX="9.5" refY="6" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
<path d="M 1.5 1.0 L 9.5 6 L 1.5 11.0" fill="none" stroke="#8E877C" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect width="744" height="520" fill="#F7F4EE"/>
<text x="372.0" y="56" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="32" font-weight="700" fill="#1F1F1C">Threshold vs Multi-Window SLO Alerting</text>
<text x="372.0" y="80" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="500" fill="#6D685F">Compact chart nodes show noisy threshold crossings versus sustained long-window burn</text>
<rect x="42.0" y="126.0" width="320.0" height="360.0" rx="18" fill="#FCFBF8" stroke="#E6E0D5" filter="url(#panelShadow)"/>
<text x="202.0" y="160.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" letter-spacing="0.06em" fill="#1F1F1C">Threshold-Based Alerting</text>
<text x="202.0" y="180.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">A single metric crosses the alert</text>
<text x="202.0" y="194.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">threshold repeatedly</text>
<text x="202.0" y="446.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">The metric bounces above and below</text>
<text x="202.0" y="460.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">the threshold several times even</text>
<text x="202.0" y="474.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">though the issue is not sustained.</text>
<rect x="382.0" y="126.0" width="320.0" height="360.0" rx="18" fill="#FCFBF8" stroke="#E6E0D5" filter="url(#panelShadow)"/>
<text x="542.0" y="160.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" letter-spacing="0.06em" fill="#1F1F1C">Multi-Window SLO Alerting</text>
<text x="542.0" y="180.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">A short window oscillates, but the</text>
<text x="542.0" y="194.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">long window stays elevated long</text>
<text x="542.0" y="208.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">enough to matter</text>
<text x="542.0" y="446.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">Short windows show volatility, but</text>
<text x="542.0" y="460.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">the long window captures sustained</text>
<text x="542.0" y="474.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">error-budget burn before paging.</text>
<rect x="85.0" y="226.0" width="244.0" height="188.0" rx="12" fill="#FFF9F3" stroke="#F27A2B" stroke-width="1.8"/>
<rect x="99.0" y="281.0" width="216.0" height="89.0" rx="8" fill="#FBFAF7" stroke="#DAD4CA" stroke-width="1"/>
<line x1="99.0" y1="370.0" x2="315.0" y2="370.0" stroke="#DAD4CA" stroke-width="1"/>
<text x="99.0" y="250.0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#1F1F1C">Metric vs threshold</text>
<line x1="99.0" y1="259.0" x2="109.0" y2="259.0" stroke="#F27A2B" stroke-width="2.2" stroke-linecap="round"/>
<text x="113.0" y="262.0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">Metric</text>
<line x1="166.6" y1="259.0" x2="176.6" y2="259.0" stroke="#6D685F" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="5 4"/>
<text x="180.6" y="262.0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">Threshold</text>
<path d="M 99.0 318.4 L 123.0 318.4 L 147.0 318.4 L 171.0 318.4 L 195.0 318.4 L 219.0 318.4 L 243.0 318.4 L 267.0 318.4 L 291.0 318.4 L 315.0 318.4" fill="none" stroke="#6D685F" stroke-width="1.6" stroke-dasharray="5 4"/>
<path d="M 99.0 363.9 L 123.0 301.3 L 147.0 349.7 L 171.0 291.4 L 195.0 341.1 L 219.0 287.1 L 243.0 345.4 L 267.0 295.7 L 291.0 352.5 L 315.0 321.2" fill="none" stroke="#F27A2B" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
<text x="99.0" y="386.0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">Repeated spikes cause churn</text>
<text x="99.0" y="398.0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">and paging friction.</text>
<rect x="425.0" y="226.0" width="244.0" height="188.0" rx="12" fill="#FFF9F3" stroke="#F27A2B" stroke-width="1.8"/>
<rect x="439.0" y="295.0" width="216.0" height="63.0" rx="8" fill="#FBFAF7" stroke="#DAD4CA" stroke-width="1"/>
<line x1="439.0" y1="358.0" x2="655.0" y2="358.0" stroke="#DAD4CA" stroke-width="1"/>
<text x="439.0" y="250.0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#1F1F1C">Short and long windows</text>
<line x1="439.0" y1="259.0" x2="449.0" y2="259.0" stroke="#58A6F4" stroke-width="2.2" stroke-linecap="round"/>
<text x="453.0" y="262.0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">Short window</text>
<line x1="540.2" y1="259.0" x2="550.2" y2="259.0" stroke="#F27A2B" stroke-width="2.2" stroke-linecap="round"/>
<text x="554.2" y="262.0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">Long window</text>
<line x1="439.0" y1="273.0" x2="449.0" y2="273.0" stroke="#6D685F" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="5 4"/>
<text x="453.0" y="276.0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">SLO trigger</text>
<path d="M 439.0 315.5 L 463.0 315.5 L 487.0 315.5 L 511.0 315.5 L 535.0 315.5 L 559.0 315.5 L 583.0 315.5 L 607.0 315.5 L 631.0 315.5 L 655.0 315.5" fill="none" stroke="#6D685F" stroke-width="1.6" stroke-dasharray="5 4"/>
<path d="M 439.0 346.9 L 463.0 326.5 L 487.0 339.2 L 511.0 310.4 L 535.0 332.4 L 559.0 299.3 L 583.0 321.4 L 607.0 307.8 L 631.0 329.0 L 655.0 343.5" fill="none" stroke="#58A6F4" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M 439.0 353.7 L 463.0 350.3 L 487.0 345.2 L 511.0 333.3 L 535.0 318.9 L 559.0 306.1 L 583.0 303.6 L 607.0 308.7 L 631.0 324.8 L 655.0 346.0" fill="none" stroke="#F27A2B" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
<text x="439.0" y="374.0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">The long window stays high</text>
<text x="439.0" y="386.0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">enough to justify</text>
<text x="439.0" y="398.0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">intervention.</text>
</svg>