<svg xmlns="http://www.w3.org/2000/svg" width="789" height="548" viewBox="0 0 789 548" role="img" aria-label="Threshold vs Multi-Window SLO Alerting">
<defs>
<filter id="panelShadow" x="-10%" y="-10%" width="120%" height="140%">
<feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(0,0,0,0.05)"/>
</filter>
<marker id="arrow" viewBox="0 0 11 12" markerWidth="11" markerHeight="12" refX="9.5" refY="6" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
<path d="M 1.5 1.0 L 9.5 6 L 1.5 11.0" fill="none" stroke="#8E877C" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect width="789" height="548" fill="#F7F4EE"/>
<text x="394.5" y="56" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="32" font-weight="700" fill="#1F1F1C">Threshold vs Multi-Window SLO Alerting</text>
<text x="394.5" y="80" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="500" fill="#6D685F">Compact chart nodes show noisy threshold crossings versus sustained long-window burn</text>
<rect x="64.5" y="126.0" width="320.0" height="388.0" rx="18" fill="#FCFBF8" stroke="#E6E0D5" filter="url(#panelShadow)"/>
<text x="224.5" y="160.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" letter-spacing="0.06em" fill="#1F1F1C">Threshold-Based Alerting</text>
<text x="224.5" y="180.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">A single metric crosses the alert</text>
<text x="224.5" y="194.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">threshold repeatedly</text>
<text x="224.5" y="474.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">The metric bounces above and below</text>
<text x="224.5" y="488.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">the threshold several times even</text>
<text x="224.5" y="502.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">though the issue is not sustained.</text>
<rect x="404.5" y="126.0" width="320.0" height="374.0" rx="18" fill="#FCFBF8" stroke="#E6E0D5" filter="url(#panelShadow)"/>
<text x="564.5" y="160.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" letter-spacing="0.06em" fill="#1F1F1C">Multi-Window SLO Alerting</text>
<text x="564.5" y="180.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">A short window oscillates, but the</text>
<text x="564.5" y="194.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">long window stays elevated long</text>
<text x="564.5" y="208.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">enough to matter</text>
<text x="564.5" y="460.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">Short windows show volatility, but</text>
<text x="564.5" y="474.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">the long window captures sustained</text>
<text x="564.5" y="488.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">error-budget burn before paging.</text>
<rect x="112.0" y="226.0" width="244.0" height="220.0" rx="12" fill="#FFF9F3" stroke="#F27A2B" stroke-width="1.8"/>
<text x="234.0" y="250.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#1F1F1C">Metric vs threshold</text>
<line x1="126.0" y1="265.0" x2="136.0" y2="265.0" stroke="#F27A2B" stroke-width="2.2" stroke-linecap="round"/>
<text x="140.0" y="268.0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">Metric</text>
<line x1="193.6" y1="265.0" x2="203.6" y2="265.0" stroke="#6D685F" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="5 4"/>
<text x="207.6" y="268.0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">Threshold</text>
<rect x="126.0" y="287.0" width="216.0" height="89.0" rx="8" fill="#FBFAF7" stroke="#DAD4CA" stroke-width="1"/>
<line x1="126.0" y1="376.0" x2="342.0" y2="376.0" stroke="#DAD4CA" stroke-width="1"/>
<path d="M 126.0 324.4 L 150.0 324.4 L 174.0 324.4 L 198.0 324.4 L 222.0 324.4 L 246.0 324.4 L 270.0 324.4 L 294.0 324.4 L 318.0 324.4 L 342.0 324.4" fill="none" stroke="#6D685F" stroke-width="1.6" stroke-dasharray="5 4"/>
<path d="M 126.0 369.9 L 150.0 307.3 L 174.0 355.7 L 198.0 297.4 L 222.0 347.1 L 246.0 293.1 L 270.0 351.4 L 294.0 301.7 L 318.0 358.5 L 342.0 327.2" fill="none" stroke="#F27A2B" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
<text x="234.0" y="408.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">Repeated spikes cause churn</text>
<text x="234.0" y="420.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">and paging friction.</text>
<rect x="452.0" y="226.0" width="244.0" height="220.0" rx="12" fill="#FFF9F3" stroke="#F27A2B" stroke-width="1.8"/>
<text x="574.0" y="250.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#1F1F1C">Short and long windows</text>
<line x1="466.0" y1="265.0" x2="476.0" y2="265.0" stroke="#58A6F4" stroke-width="2.2" stroke-linecap="round"/>
<text x="480.0" y="268.0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">Short window</text>
<line x1="567.2" y1="265.0" x2="577.2" y2="265.0" stroke="#F27A2B" stroke-width="2.2" stroke-linecap="round"/>
<text x="581.2" y="268.0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">Long window</text>
<line x1="466.0" y1="279.0" x2="476.0" y2="279.0" stroke="#6D685F" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="5 4"/>
<text x="480.0" y="282.0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">SLO trigger</text>
<rect x="466.0" y="301.0" width="216.0" height="63.0" rx="8" fill="#FBFAF7" stroke="#DAD4CA" stroke-width="1"/>
<line x1="466.0" y1="364.0" x2="682.0" y2="364.0" stroke="#DAD4CA" stroke-width="1"/>
<path d="M 466.0 321.5 L 490.0 321.5 L 514.0 321.5 L 538.0 321.5 L 562.0 321.5 L 586.0 321.5 L 610.0 321.5 L 634.0 321.5 L 658.0 321.5 L 682.0 321.5" fill="none" stroke="#6D685F" stroke-width="1.6" stroke-dasharray="5 4"/>
<path d="M 466.0 352.9 L 490.0 332.5 L 514.0 345.2 L 538.0 316.4 L 562.0 338.4 L 586.0 305.3 L 610.0 327.4 L 634.0 313.8 L 658.0 335.0 L 682.0 349.5" fill="none" stroke="#58A6F4" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M 466.0 359.7 L 490.0 356.3 L 514.0 351.2 L 538.0 339.3 L 562.0 324.9 L 586.0 312.1 L 610.0 309.6 L 634.0 314.7 L 658.0 330.8 L 682.0 352.0" fill="none" stroke="#F27A2B" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
<text x="574.0" y="396.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">The long window stays high</text>
<text x="574.0" y="408.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">enough to justify</text>
<text x="574.0" y="420.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">intervention.</text>
</svg>