<line x1="99.0" y1="279.0" x2="109.0" y2="279.0" stroke="#76C68B" stroke-width="2.2" stroke-linecap="round"/>
<text x="113.0" y="282.0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">Infra drift</text>
<line x1="194.6" y1="279.0" x2="204.6" y2="279.0" stroke="#C98BFF" stroke-width="2.2" stroke-linecap="round"/>
<text x="208.6" y="282.0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">Capacity</text>
<line x1="99.0" y1="293.0" x2="109.0" y2="293.0" stroke="#F06A63" stroke-width="2.2" stroke-linecap="round"/>
<text x="113.0" y="296.0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">Unknown</text>
