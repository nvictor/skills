<svg xmlns="http://www.w3.org/2000/svg" width="744" height="576" viewBox="0 0 744 576" role="img" aria-label="Operational Load Distribution">
<defs>
<filter id="panelShadow" x="-10%" y="-10%" width="120%" height="140%">
<feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(0,0,0,0.05)"/>
</filter>
<marker id="arrow" viewBox="0 0 11 12" markerWidth="11" markerHeight="12" refX="9.5" refY="6" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
<path d="M 1.5 1.0 L 9.5 6 L 1.5 11.0" fill="none" stroke="#8E877C" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect width="744" height="576" fill="#F7F4EE"/>
<text x="372.0" y="56" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="32" font-weight="700" fill="#1F1F1C">Operational Load Distribution</text>
<text x="372.0" y="80" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="500" fill="#6D685F">One dataset shown as a bar chart for comparison and a pie chart for share-of-whole</text>
<rect x="42.0" y="126.0" width="320.0" height="388.0" rx="18" fill="#FCFBF8" stroke="#E6E0D5" filter="url(#panelShadow)"/>
<text x="202.0" y="160.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" letter-spacing="0.06em" fill="#1F1F1C">Bar Chart View</text>
<text x="202.0" y="180.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">Good for comparing category</text>
<text x="202.0" y="194.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">magnitudes directly</text>
<text x="202.0" y="474.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">The largest operational load in this</text>
<text x="202.0" y="488.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">sample comes from alert noise, with</text>
<text x="202.0" y="502.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">deploy regressions a distant second.</text>
<rect x="382.0" y="126.0" width="320.0" height="416.0" rx="18" fill="#FCFBF8" stroke="#E6E0D5" filter="url(#panelShadow)"/>
<text x="542.0" y="160.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" letter-spacing="0.06em" fill="#1F1F1C">Pie Chart View</text>
<text x="542.0" y="180.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">Good for showing how much each</text>
<text x="542.0" y="194.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">category contributes to the whole</text>
<text x="542.0" y="502.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">The same data reads differently here:</text>
<text x="542.0" y="516.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">alert noise clearly dominates the</text>
<text x="542.0" y="530.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">overall operational burden.</text>
<rect x="425.0" y="208.0" width="244.0" height="280.0" rx="12" fill="#FFF9F3" stroke="#F27A2B" stroke-width="1.8"/>
<text x="547.0" y="232.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#1F1F1C">Interrupt share of total</text>
<line x1="439.0" y1="247.0" x2="449.0" y2="247.0" stroke="#F27A2B" stroke-width="2.2" stroke-linecap="round"/>
<text x="453.0" y="250.0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">Alert noise (42%)</text>
<line x1="439.0" y1="261.0" x2="449.0" y2="261.0" stroke="#58A6F4" stroke-width="2.2" stroke-linecap="round"/>
<text x="453.0" y="264.0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">Deploy regressions (24%)</text>
<line x1="439.0" y1="275.0" x2="449.0" y2="275.0" stroke="#76C68B" stroke-width="2.2" stroke-linecap="round"/>
<text x="453.0" y="278.0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">Infra drift (18%)</text>
<line x1="439.0" y1="289.0" x2="449.0" y2="289.0" stroke="#C98BFF" stroke-width="2.2" stroke-linecap="round"/>
<text x="453.0" y="292.0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">Capacity (10%)</text>
<line x1="551.4" y1="289.0" x2="561.4" y2="289.0" stroke="#F06A63" stroke-width="2.2" stroke-linecap="round"/>
<text x="565.4" y="292.0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">Unknown (6%)</text>
<rect x="439.0" y="311.0" width="216.0" height="95.0" rx="8" fill="#FBFAF7" stroke="#DAD4CA" stroke-width="1"/>
