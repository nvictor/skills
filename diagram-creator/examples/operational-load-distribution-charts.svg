<path d="M 547.0 358.5 L 509.4 334.7 A 44.5 44.5 0 0 1 530.6 317.1 Z" fill="#C98BFF" stroke="#FFFFFF" stroke-width="1.2" opacity="0.96"/>
<path d="M 547.0 358.5 L 530.6 317.1 A 44.5 44.5 0 0 1 547.0 314.0 Z" fill="#F06A63" stroke="#FFFFFF" stroke-width="1.2" opacity="0.96"/>
<text x="547.0" y="438.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">Pie charts emphasize the</text>
<text x="547.0" y="450.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">overall share captured by each</text>
<text x="547.0" y="462.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">category.</text>
<rect x="85.0" y="226.0" width="244.0" height="220.0" rx="12" fill="#FFF9F3" stroke="#F27A2B" stroke-width="1.8"/>
<text x="207.0" y="250.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#1F1F1C">Interrupt sources by count</text>
<line x1="99.0" y1="265.0" x2="109.0" y2="265.0" stroke="#F27A2B" stroke-width="2.2" stroke-linecap="round"/>
<text x="113.0" y="268.0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6D685F">Alert noise</text>
<line x1="194.6" y1="265.0" x2="204.6" y2="265.0" stroke="#58A6F4" stroke-width="2.2" stroke-linecap="round"/>
