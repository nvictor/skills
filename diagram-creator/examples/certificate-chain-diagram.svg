<svg xmlns="http://www.w3.org/2000/svg" width="496" height="526" viewBox="0 0 496 526" role="img" aria-label="Certificate Chain">
<defs>
<filter id="panelShadow" x="-10%" y="-10%" width="120%" height="140%">
<feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(0,0,0,0.05)"/>
</filter>
<marker id="arrow" viewBox="0 0 11 12" markerWidth="11" markerHeight="12" refX="9.5" refY="6" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
<path d="M 1.5 1.0 L 9.5 6 L 1.5 11.0" fill="none" stroke="#8E877C" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect width="496" height="526" fill="#F7F4EE"/>
<text x="248.0" y="56" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="32" font-weight="700" fill="#1F1F1C">Certificate Chain</text>
<text x="248.0" y="80" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="500" fill="#6D685F">A server certificate chains through a CA to a trusted root</text>
<rect x="42.0" y="126.0" width="412.0" height="366.0" rx="18" fill="#FCFBF8" stroke="#E6E0D5" filter="url(#panelShadow)"/>
<text x="248.0" y="160.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" letter-spacing="0.06em" fill="#1F1F1C">Certificate Path</text>
<text x="248.0" y="180.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">Each certificate is signed by the next authority</text>
<text x="248.0" y="194.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">in the chain</text>
<text x="248.0" y="466.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">The client validates the server certificate by</text>
<text x="248.0" y="480.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">walking upward to a root CA it already trusts.</text>
<path d="M 144.0 272.0 L 144.0 289.0" fill="none" stroke="#8E877C" stroke-width="1.7" marker-end="url(#arrow)"/>
<path d="M 144.0 336.0 L 144.0 353.0" fill="none" stroke="#8E877C" stroke-width="1.7" marker-end="url(#arrow)"/>
<path d="M 274.0 411.0 L 265.0 411.0 Q 256.0 411.0 256.0 402.0 L 256.0 387.0 Q 256.0 377.0 246.0 377.0 L 204.0 377.0" fill="none" stroke="#8E877C" stroke-width="1.7" marker-end="url(#arrow)"/>
<rect x="66.0" y="226.0" width="156.0" height="46.0" rx="8" fill="#EAF4FF" stroke="#58A6F4" stroke-width="2"/>
<text x="144.0" y="253.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">Server certificate</text>
<rect x="76.5" y="290.0" width="135.0" height="46.0" rx="8" fill="#FFFFFF" stroke="#DAD4CA" stroke-width="1.2"/>
<text x="144.0" y="317.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">Intermediate CA</text>
<rect x="85.0" y="354.0" width="118.0" height="46.0" rx="8" fill="#FFFFFF" stroke="#DAD4CA" stroke-width="1.2"/>
<text x="144.0" y="381.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">Root CA</text>
<rect x="274.0" y="388.0" width="156.0" height="46.0" rx="8" fill="#FFFFFF" stroke="#DAD4CA" stroke-width="1.2"/>
<text x="352.0" y="415.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">Client trust store</text>
</svg>