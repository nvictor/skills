<svg xmlns="http://www.w3.org/2000/svg" width="1179" height="520" viewBox="0 0 1179 520" role="img" aria-label="Ecommerce Checkout Flow">
<defs>
<filter id="panelShadow" x="-10%" y="-10%" width="120%" height="140%">
<feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(0,0,0,0.05)"/>
</filter>
<marker id="arrow" viewBox="0 0 11 12" markerWidth="11" markerHeight="12" refX="9.5" refY="6" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
<path d="M 1.5 1.0 L 9.5 6 L 1.5 11.0" fill="none" stroke="#8E877C" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect width="1179" height="520" fill="#F7F4EE"/>
<text x="589.5" y="56" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="32" font-weight="700" fill="#1F1F1C">Ecommerce Checkout Flow</text>
<text x="589.5" y="80" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="500" fill="#6D685F">From shopper intent through validation, payment, confirmation, and fulfillment</text>
<rect x="42.0" y="126.0" width="320.0" height="360.0" rx="18" fill="#FCFBF8" stroke="#E6E0D5" filter="url(#panelShadow)"/>
<text x="202.0" y="160.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" letter-spacing="0.06em" fill="#1F1F1C">Storefront</text>
<text x="202.0" y="180.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">The shopper moves from cart review</text>
<text x="202.0" y="194.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">into checkout</text>
<text x="202.0" y="446.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">The checkout UI captures delivery</text>
<text x="202.0" y="460.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">details and payment intent before</text>
<text x="202.0" y="474.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">submission.</text>
<rect x="382.0" y="126.0" width="364.0" height="360.0" rx="18" fill="#FCFBF8" stroke="#E6E0D5" filter="url(#panelShadow)"/>
<text x="564.0" y="160.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" letter-spacing="0.06em" fill="#1F1F1C">Checkout Services</text>
<text x="564.0" y="180.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">Backend services check the order before</text>
<text x="564.0" y="194.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">committing it</text>
<text x="564.0" y="460.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">The order is created only after price,</text>
<text x="564.0" y="474.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">inventory, and payment checks clear.</text>
<rect x="766.0" y="126.0" width="371.0" height="360.0" rx="18" fill="#FCFBF8" stroke="#E6E0D5" filter="url(#panelShadow)"/>
<text x="951.5" y="160.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" letter-spacing="0.06em" fill="#1F1F1C">Post-Purchase</text>
<text x="951.5" y="180.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">The confirmed order fans out to customer</text>
<text x="951.5" y="194.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">messaging and operations</text>
<text x="951.5" y="460.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">Confirmation and fulfillment can proceed in</text>
<text x="951.5" y="474.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">parallel once the order exists.</text>
<rect x="195.0" y="212.0" width="118.0" height="46.0" rx="8" fill="#FFFFFF" stroke="#DAD4CA" stroke-width="1.2"/>
<text x="254.0" y="239.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">Review cart</text>
<rect x="413.0" y="226.0" width="135.0" height="46.0" rx="8" fill="#FFFFFF" stroke="#DAD4CA" stroke-width="1.2"/>
<text x="480.5" y="253.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">Validate prices</text>
<circle cx="120.0" cy="272.8" r="34.0" fill="#FFFFFF" stroke="#DAD4CA" stroke-width="1.4"/>
<circle cx="120.0" cy="264.8" r="8" fill="none" stroke="#35C89B" stroke-width="2"/>
<path d="M 108.0 285.8 C 110.0 274.8, 130.0 274.8, 132.0 285.8" fill="none" stroke="#35C89B" stroke-width="2"/>
<text x="120.0" y="226.8" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="500" fill="#1F1F1C">Shopper</text>
<rect x="190.0" y="276.0" width="128.0" height="46.0" rx="8" fill="#FFFFFF" stroke="#DAD4CA" stroke-width="1.2"/>
<text x="254.0" y="295.5" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">Enter shipping</text>
<text x="254.0" y="310.5" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">and payment</text>
<rect x="964.0" y="288.0" width="149.0" height="46.0" rx="8" fill="#FFFFFF" stroke="#DAD4CA" stroke-width="1.2"/>
<text x="1038.5" y="315.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">Queue fulfillment</text>
<rect x="406.0" y="290.0" width="149.0" height="46.0" rx="8" fill="#FFFFFF" stroke="#DAD4CA" stroke-width="1.2"/>
<text x="480.5" y="317.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">Reserve inventory</text>
<rect x="573.0" y="290.0" width="149.0" height="46.0" rx="8" fill="#EAF4FF" stroke="#58A6F4" stroke-width="2"/>
<text x="647.5" y="317.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">Authorize payment</text>
<rect x="801.5" y="290.0" width="133.0" height="42.0" rx="8" fill="#76C68B" stroke="#5CAD73" stroke-width="1.6"/>
<text x="868.0" y="315.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#2C6C3C">Order confirmed</text>
<rect x="195.0" y="340.0" width="118.0" height="46.0" rx="8" fill="#EAF4FF" stroke="#58A6F4" stroke-width="2"/>
<text x="254.0" y="367.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">Submit order</text>
<rect x="790.0" y="350.0" width="156.0" height="46.0" rx="8" fill="#FFFFFF" stroke="#DAD4CA" stroke-width="1.2"/>
<text x="868.0" y="377.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">Send receipt email</text>
<rect x="588.5" y="354.0" width="118.0" height="46.0" rx="8" fill="#FFFFFF" stroke="#DAD4CA" stroke-width="1.2"/>
<text x="647.5" y="373.5" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">Create order</text>
<text x="647.5" y="388.5" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">record</text>
