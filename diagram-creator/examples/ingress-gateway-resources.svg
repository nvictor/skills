<text x="375.0" y="80" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="500" fill="#6D685F">Comparing the monolithic ingress model with the modular Gateway API resource stack</text>
