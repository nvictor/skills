<svg xmlns="http://www.w3.org/2000/svg" width="1084" height="520" viewBox="0 0 1084 520" role="img" aria-label="Pub/Sub Topic and Subscription Relationship">
<defs>
<filter id="panelShadow" x="-10%" y="-10%" width="120%" height="140%">
<feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(0,0,0,0.05)"/>
</filter>
<marker id="arrow" viewBox="0 0 11 12" markerWidth="11" markerHeight="12" refX="9.5" refY="6" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
<path d="M 1.5 1.0 L 9.5 6 L 1.5 11.0" fill="none" stroke="#8E877C" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect width="1084" height="520" fill="#F7F4EE"/>
<text x="542.0" y="56" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="32" font-weight="700" fill="#1F1F1C">Pub/Sub Topic and Subscription Relationship</text>
<text x="542.0" y="80" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="500" fill="#6D685F">A topic accepts published messages and fans out to independently managed subscriptions</text>
<rect x="42.0" y="126.0" width="320.0" height="360.0" rx="18" fill="#FCFBF8" stroke="#E6E0D5" filter="url(#panelShadow)"/>
<text x="202.0" y="160.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" letter-spacing="0.06em" fill="#1F1F1C">Publishers</text>
<text x="202.0" y="180.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">Applications publish messages into</text>
<text x="202.0" y="194.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">one topic resource</text>
<text x="202.0" y="446.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">The topic resource defines the</text>
<text x="202.0" y="460.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">Pub/Sub topic that producers publish</text>
<text x="202.0" y="474.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">into.</text>
<rect x="382.0" y="126.0" width="320.0" height="360.0" rx="18" fill="#FCFBF8" stroke="#E6E0D5" filter="url(#panelShadow)"/>
<text x="542.0" y="160.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" letter-spacing="0.06em" fill="#1F1F1C">Subscriptions</text>
<text x="542.0" y="180.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">Each subscription points at one</text>
<text x="542.0" y="194.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">topic; a topic can have many</text>
<text x="542.0" y="208.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">subscriptions</text>
<text x="542.0" y="446.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">A google_pubsub_subscription</text>
<text x="542.0" y="460.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">configures ack deadlines, retention,</text>
<text x="542.0" y="474.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">filters, dead-lettering, and delivery</text>
<rect x="722.0" y="126.0" width="320.0" height="360.0" rx="18" fill="#FCFBF8" stroke="#E6E0D5" filter="url(#panelShadow)"/>
<text x="882.0" y="160.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" letter-spacing="0.06em" fill="#1F1F1C">Consumers</text>
<text x="882.0" y="180.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">Pull workers request messages; push</text>
<text x="882.0" y="194.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1F1F1C">subscriptions deliver to endpoints</text>
<text x="882.0" y="446.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">Pull consumers initiate reads from</text>
<text x="882.0" y="460.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">the subscription; push subscriptions</text>
<text x="882.0" y="474.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6D685F">deliver messages to the configured</text>
<rect x="467.5" y="226.0" width="149.0" height="46.0" rx="8" fill="#EAF4FF" stroke="#58A6F4" stroke-width="2"/>
<text x="542.0" y="253.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">Pull subscription</text>
<rect x="823.0" y="226.0" width="118.0" height="46.0" rx="8" fill="#FFFFFF" stroke="#DAD4CA" stroke-width="1.2"/>
<text x="882.0" y="253.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">Pull workers</text>
<circle cx="202.0" cy="286.8" r="34.0" fill="#FFFFFF" stroke="#DAD4CA" stroke-width="1.4"/>
<circle cx="202.0" cy="278.8" r="8" fill="none" stroke="#35C89B" stroke-width="2"/>
<path d="M 190.0 299.8 C 192.0 288.8, 212.0 288.8, 214.0 299.8" fill="none" stroke="#35C89B" stroke-width="2"/>
<text x="202.0" y="240.8" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="500" fill="#1F1F1C">Publisher app</text>
<rect x="467.5" y="290.0" width="149.0" height="46.0" rx="8" fill="#FFFFFF" stroke="#DAD4CA" stroke-width="1.2"/>
<text x="542.0" y="317.0" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">Push subscription</text>
<rect x="823.0" y="290.0" width="118.0" height="46.0" rx="8" fill="#FFFFFF" stroke="#DAD4CA" stroke-width="1.2"/>
<text x="882.0" y="309.5" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">HTTPS push</text>
<text x="882.0" y="324.5" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">endpoint</text>
<rect x="120.5" y="338.8" width="163.0" height="46.0" rx="8" fill="#EAF4FF" stroke="#58A6F4" stroke-width="2"/>
<text x="202.0" y="365.8" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1F1F1C">google_pubsub_topic</text>
<path d="M 202.0 320.8 L 202.0 337.8" fill="none" stroke="#8E877C" stroke-width="1.7" marker-end="url(#arrow)"/>
<path d="M 283.5 361.8 L 292.5 361.8 Q 301.5 361.8 301.5 352.8 L 301.5 259.0 Q 301.5 249.0 311.5 249.0 L 466.5 249.0" fill="none" stroke="#8E877C" stroke-width="1.7" marker-end="url(#arrow)"/>
<path d="M 283.5 361.8 L 292.5 361.8 Q 301.5 361.8 301.5 352.8 L 301.5 323.0 Q 301.5 313.0 311.5 313.0 L 466.5 313.0" fill="none" stroke="#8E877C" stroke-width="1.7" marker-end="url(#arrow)"/>
<path d="M 823.0 249.0 L 617.5 249.0" fill="none" stroke="#8E877C" stroke-width="1.7" marker-end="url(#arrow)"/>
<path d="M 616.5 313.0 L 822.0 313.0" fill="none" stroke="#8E877C" stroke-width="1.7" marker-end="url(#arrow)"/>
</svg>